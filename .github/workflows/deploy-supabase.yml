name: Deploy Supabase Backend

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"

permissions:
  contents: read

concurrency:
  group: supabase-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: thaoylgvgsvbouyirdfg

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pytest

      - name: Run Python tests
        run: python -m pytest tests/ -v

      - name: Compile scraper
        run: python -m compileall scraper

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Typecheck mobile app
        working-directory: mobile
        run: npm run typecheck

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Verify deployment secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "::error::Missing SUPABASE_ACCESS_TOKEN secret" && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo "::error::Missing SUPABASE_DB_PASSWORD secret" && exit 1)

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: npx supabase@latest link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Push database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: npx supabase@latest db push --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          npx supabase@latest functions deploy generate-meal-plan --project-ref "$SUPABASE_PROJECT_REF" --use-api
          npx supabase@latest functions deploy chat --project-ref "$SUPABASE_PROJECT_REF" --use-api

      - name: Smoke test protected functions
        run: |
          generate_status="$(curl -sS -o /tmp/generate-meal-plan-smoke.json -w "%{http_code}" -X POST "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/generate-meal-plan")"
          chat_status="$(curl -sS -o /tmp/chat-smoke.json -w "%{http_code}" -X POST "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/chat")"
          test "$generate_status" = "401"
          test "$chat_status" = "401"
